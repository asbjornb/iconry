name = "iconry"
pages_build_output_dir = "dist"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "iconry-assets"

# Secrets (set via Cloudflare Dashboard > Pages > Settings > Environment Variables):
# REPLICATE_API_TOKEN
# AUTH_SECRET - shared secret for simple auth
